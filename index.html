<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürün Sayfası</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f5f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* Eski Grid yapısının modern hali */
        .container { background: white; display: grid; grid-template-columns: 1fr 1fr; max-width: 750px; width: 100%; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow: hidden; }
        
        /* Sol Bölüm */
        .left-side { background: #fafafa; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .left-side img { max-width: 90%; height: auto; border-radius: 8px; }
        
        /* Sağ Bölüm */
        .right-side { padding: 30px; display: flex; flex-direction: column; justify-content: center; }
        h1 { font-size: 22px; color: #1d1d1f; margin-bottom: 5px; }
        .price { font-size: 20px; font-weight: bold; color: #222; margin-bottom: 20px; }
        
        .title { font-size: 12px; font-weight: bold; color: #86868b; text-transform: uppercase; margin-bottom: 8px; margin-top: 15px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
        
        /* Basit ve şık butonlar */
        .btn { padding: 8px 14px; border: 1px solid #d2d2d7; background: white; border-radius: 8px; font-size: 13px; cursor: pointer; transition: 0.15s; }
        .btn:hover { border-color: #0071e3; color: #0071e3; }
        .btn.active { border-color: #0071e3; background: #0071e3; color: white; }

        /* Özet Kutusu */
        .info-box { background: #f5f5f7; padding: 12px; border-radius: 8px; font-size: 13px; color: #515154; margin-top: 20px; border: 1px solid #e5e5ea; }
    </style>
</head>
<body>

<div class="container">
    <!-- SOL: RESİM -->
    <div class="left-side">
        <img id="product-img" src="https://unsplash.com" alt="Ürün">
    </div>

    <!-- SAĞ: İÇERİK -->
    <div class="right-side">
        <h1>Mühendislik Serisi</h1>
        <div class="price" id="total-price">300.00 TL</div>

        <!-- 1. SEÇENEK -->
        <div class="title">1. Renk</div>
        <div class="btn-group">
            <button class="btn active" onclick="changeColor('Siyah', 'https://unsplash.com', this)">Siyah</button>
            <button class="btn" onclick="changeColor('Beyaz', 'https://unsplash.com', this)">Beyaz</button>
        </div>

        <!-- 2. SEÇENEK -->
        <div class="title">2. Beden</div>
        <div class="btn-group">
            <button class="btn active" onclick="changeSize('S', 0, this)">S</button>
            <button class="btn" onclick="changeSize('M', 10, this)">M (+10 TL)</button>
            <button class="btn" onclick="changeSize('L', 20, this)">L (+20 TL)</button>
        </div>

        <!-- 3. SEÇENEK -->
        <div class="title">3. Özellik</div>
        <div class="btn-group">
            <button class="btn active" onclick="changeExtra('Baskısız', 0, this)">Standart</button>
            <button class="btn" onclick="changeExtra('İsimli', 50, this)">İsim Ekle (+50 TL)</button>
        </div>

        <!-- ÖZET ALANI -->
        <div class="info-box" id="summary">
            Seçim: Siyah / Beden: S / Standart
        </div>
    </div>
</div>

<script>
// Seçimlerin durumunu tutan basit değişkenler
let currentColor = "Siyah";
let currentSize = "S";
let currentExtra = "Baskısız";

let basePrice = 300;
let sizePrice = 0;
let extraPrice = 0;

function changeColor(color, imgUrl, element) {
    currentColor = color;
    document.getElementById("product-img").src = imgUrl;
    
    // Buton aktiflik sınıflarını ayarla
    let buttons = element.parentElement.getElementsByClassName("btn");
    for(let b of buttons) b.classList.remove("active");
    element.classList.add("active");
    
    updateSummary();
}

function changeSize(size, additionalPrice, element) {
    currentSize = size;
    sizePrice = additionalPrice;
    
    let buttons = element.parentElement.getElementsByClassName("btn");
    for(let b of buttons) b.classList.remove("active");
    element.classList.add("active");
    
    updateSummary();
}

function changeExtra(extra, additionalPrice, element) {
    currentExtra = extra;
    extraPrice = additionalPrice;
    
    let buttons = element.parentElement.getElementsByClassName("btn");
    for(let b of buttons) b.classList.remove("active");
    element.classList.add("active");
    
    updateSummary();
}

function updateSummary() {
    // Toplam fiyatı hesapla ve ekrana yaz
    let total = basePrice + sizePrice + extraPrice;
    document.getElementById("total-price").innerText = total.toFixed(2) + " TL";
    
    // Alt kutudaki özet yazısını güncelle
    document.getElementById("summary").innerText = `Seçim: ${currentColor} / Beden: ${currentSize} / ${currentExtra}`;
}
</script>

</body>
</html>
